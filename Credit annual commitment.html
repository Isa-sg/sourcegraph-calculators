<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annual commitment options (credits)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#e0e0e0;font-family:'Inter',sans-serif;padding:24px}
.wrap{max-width:1100px;margin:0 auto}
h1{font-size:18px;font-weight:500;color:#fff;margin-bottom:4px}
.toggle-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;margin-top:8px}
.toggle-label{font-size:12px;color:#888}
.toggle{position:relative;width:36px;height:20px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:#333;border-radius:20px;transition:background .2s}
.toggle input:checked+.toggle-track{background:#5cb85c}
.toggle-thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle input:checked~.toggle-thumb{transform:translateX(16px)}
.inputs-bar{background:#1a1a1a;border:0.5px solid #333;border-radius:8px;padding:16px 20px;display:flex;gap:24px;margin-bottom:6px;flex-wrap:wrap;align-items:flex-end}
.inputs-note{font-size:11px;color:#666;margin-bottom:8px;padding-left:2px;transition:opacity .2s}
.inputs-note.hidden{opacity:0;pointer-events:none}
.grandfather-bar{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-left:2px;transition:opacity .2s}
.grandfather-bar.hidden{opacity:0;pointer-events:none}
.grandfather-label{font-size:11px;color:#888}
.grandfather-label.active{color:#e8a838}
.input-group{display:flex;flex-direction:column;gap:4px}
.input-group label{font-size:10px;font-weight:500;letter-spacing:.06em;color:#888;text-transform:uppercase}
.sublabel{font-size:10px;color:#555;transition:opacity .2s;min-height:14px}
.sublabel.hidden{opacity:0;pointer-events:none}
.input-group input{background:#111;border:0.5px solid #444;border-radius:6px;color:#fff;font-size:14px;padding:8px 10px;width:150px;outline:none}
.input-group input:focus{border-color:#666}
.months-bar{background:#1a2a1a;border:0.5px solid #2a3a2a;border-radius:8px;padding:12px 20px;display:flex;align-items:flex-end;gap:16px;margin-bottom:6px;flex-wrap:wrap}
.months-label{font-size:11px;font-weight:500;color:#5cb85c;padding-bottom:12px}
.midterm-note{font-size:11px;color:#e8a838;font-style:italic;margin-bottom:16px;padding-left:2px}
.midterm-note.hidden{display:none}
table{width:100%;border-collapse:collapse;border-radius:8px;overflow:hidden;border:0.5px solid #333}
.hdr-empty{background:#1a1a1a;width:200px}
.hdr-base{background:#1e2a1e;padding:14px 16px;text-align:center;border-left:0.5px solid #333}
.hdr-growth{background:#2a2318;padding:14px 16px;text-align:center;border-left:0.5px solid #333}
.hdr-scale{background:#2a1c1c;padding:14px 16px;text-align:center;border-left:0.5px solid #333}
.sname{font-size:13px;font-weight:500}
.sname.base{color:#5cb85c}.sname.growth{color:#e8a838}.sname.scale{color:#e85555}
.ssub{font-size:11px;color:#888;margin-top:3px}
tbody tr td{padding:10px 16px;font-size:13px;border-bottom:0.5px solid #2a2a2a;color:#ddd}
tbody tr td:first-child{color:#bbb;font-weight:500;background:#1a1a1a;width:200px}
.vb{background:#1e2a1e;text-align:center;border-left:0.5px solid #2a2a2a}
.vg{background:#2a2318;text-align:center;border-left:0.5px solid #2a2a2a}
.vs{background:#2a1c1c;text-align:center;border-left:0.5px solid #2a2a2a}
.na{color:#555;font-style:italic}
.spacer td{background:#111;border-bottom:none;padding:4px 0}
.rate-cell{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0}
.rate-input{background:#111;border:0.5px solid #555;border-radius:5px;color:#fff;font-size:13px;padding:5px 8px;width:80px;text-align:center;outline:none}
.rate-input:focus{border-color:#888}
.rate-input.blocked{border-color:#e85555;color:#e85555}
.rate-input.hard-blocked{border-color:#e85555;color:#e85555;background:#2a1010}
.tier-badge{font-size:10px;color:#888;letter-spacing:.04em;transition:opacity .2s}
.tier-badge.hidden{opacity:0;pointer-events:none}
.approval-msg{font-size:10px;font-style:italic;margin-top:1px;text-align:center;max-width:170px;transition:opacity .2s;line-height:1.4}
.approval-msg.hidden{opacity:0;pointer-events:none}
.approval-msg.nodisc{color:#e85555}
.approval-msg.ghos{color:#e8a838}
.approval-msg.vpcro{color:#e85555}
.approval-msg.hardstop{color:#e85555;font-weight:500}
.savings{color:#5cb85c;font-weight:500}
.incl-label{transition:color .2s}
.incl-label.grandfathered{color:#e8a838}
tfoot td{padding:8px 16px;font-size:11px;color:#555;background:#1a1a1a;border-top:0.5px solid #2a2a2a}
</style>
</head>
<body>

  <h1>Annual commitment options (credits)</h1>

    <span class="toggle-label">Show details</span>

  </div>

      <label>Number of users</label>
      <div class="sublabel" id="sublabel-users">&nbsp;</div>
      <input type="number" id="users" placeholder="e.g. 500" min="1">
    </div>
